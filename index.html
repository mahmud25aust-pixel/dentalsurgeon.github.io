<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ETCBL HR — Login</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .login-form h2{font-size:20px;margin-bottom:5px}
  .login-form>.sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  #page-loader{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:10px}
  .sp{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="page-loader">
  <div class="sp"></div>
  <div style="font-size:14px;font-weight:600;color:var(--primary)">Connecting to database…</div>
</div>

<div class="login-page" id="login-wrap" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <h1>ETCBL <span>HR</span></h1>
      <p>Human Resource Management System</p>
      <p style="font-size:11px;margin-top:2px;opacity:.55">etcblglobal.com</p>
    </div>
    <div class="login-divider"></div>
    <div class="login-form">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to your HR account</p>
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
      <div id="err" class="error-msg"></div>
    </div>
    <div class="login-hint">
      <strong>Demo credentials</strong><br>
      Admin: <strong>admin</strong> / <strong>admin123</strong><br>
      Employee: <strong>rkarim</strong> / <strong>emp123</strong>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/core.js"></script>
<script>
  async function start() {
    const sess = DB.auth.session();
    if (sess) { window.location.href = sess.role === 'admin' ? 'admin.html' : 'employee.html'; return; }
    try {
      await DB.init();
    } catch(e) {
      document.getElementById('page-loader').innerHTML =
        `<div style="text-align:center;padding:30px;max-width:420px">
          <div style="font-size:28px;margin-bottom:12px">&#9888;</div>
          <div style="font-weight:700;font-size:16px;color:#dc2626;margin-bottom:10px">Cannot connect to database</div>
          <div style="font-size:13px;color:#64748b;line-height:1.7">
            Go to <strong>console.firebase.google.com</strong><br>
            &rarr; Select project <strong>etcbl-hr</strong><br>
            &rarr; <strong>Firestore Database</strong> &rarr; <strong>Create database</strong><br>
            &rarr; Start in <strong>test mode</strong> &rarr; Done
          </div>
          <button onclick="location.reload()" style="margin-top:18px;padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">Retry</button>
        </div>`;
      return;
    }
    document.getElementById('page-loader').style.display = 'none';
    document.getElementById('login-wrap').style.display = '';
    document.getElementById('username').focus();
  }
  start();

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const u   = document.getElementById('username').value.trim();
    const p   = document.getElementById('password').value;
    const err = document.getElementById('err');
    const btn = document.getElementById('login-btn');
    if (!u || !p) { err.textContent = 'Please enter username and password.'; err.style.display = 'block'; return; }
    btn.textContent = 'Signing in…';
    btn.disabled = true;
    err.style.display = 'none';
    try {
      const sess = await DB.auth.login(u, p);
      if (!sess) {
        err.textContent = 'Invalid username or password.';
        err.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
        return;
      }
      window.location.href = sess.role === 'admin' ? 'admin.html' : 'employee.html';
    } catch(e) {
      err.textContent = 'Connection error. Please try again.';
      err.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
